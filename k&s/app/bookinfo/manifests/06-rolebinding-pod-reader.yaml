apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods-bookinfo
  namespace: bookinfo
  labels:
    app.kubernetes.io/part-of: bookinfo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-reader
subjects:
  - kind: ServiceAccount
    name: productpage
    namespace: bookinfo
  - kind: ServiceAccount
    name: details
    namespace: bookinfo
  - kind: ServiceAccount
    name: reviews
    namespace: bookinfo
  - kind: ServiceAccount
    name: ratings
    namespace: bookinfo
