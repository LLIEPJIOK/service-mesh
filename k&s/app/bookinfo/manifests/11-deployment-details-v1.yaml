apiVersion: apps/v1
kind: Deployment
metadata:
  name: details-v1
  namespace: bookinfo
  labels:
    app: details
    version: v1
    app.kubernetes.io/name: details
    app.kubernetes.io/version: v1
    app.kubernetes.io/part-of: bookinfo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: details
      version: v1
  template:
    metadata:
      labels:
        app: details
        version: v1
        app.kubernetes.io/name: details
        app.kubernetes.io/version: v1
        app.kubernetes.io/part-of: bookinfo
    spec:
      serviceAccountName: details
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: details
          image: docker.io/istio/examples-bookinfo-details-v1:1.20.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9080
          startupProbe:
            tcpSocket:
              port: 9080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 9080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 9080
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 30m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
