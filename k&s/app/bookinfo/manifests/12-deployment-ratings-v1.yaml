apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratings-v1
  namespace: bookinfo
  labels:
    app: ratings
    version: v1
    app.kubernetes.io/name: ratings
    app.kubernetes.io/version: v1
    app.kubernetes.io/part-of: bookinfo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ratings
      version: v1
  template:
    metadata:
      labels:
        app: ratings
        version: v1
        app.kubernetes.io/name: ratings
        app.kubernetes.io/version: v1
        app.kubernetes.io/part-of: bookinfo
    spec:
      serviceAccountName: ratings
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ratings
          image: docker.io/istio/examples-bookinfo-ratings-v1:1.20.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9080
          readinessProbe:
            tcpSocket:
              port: 9080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 30m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
