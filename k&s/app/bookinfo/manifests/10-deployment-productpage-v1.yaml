apiVersion: apps/v1
kind: Deployment
metadata:
  name: productpage-v1
  namespace: bookinfo
  labels:
    app: productpage
    version: v1
    app.kubernetes.io/name: productpage
    app.kubernetes.io/version: v1
    app.kubernetes.io/part-of: bookinfo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productpage
      version: v1
  template:
    metadata:
      labels:
        app: productpage
        version: v1
        app.kubernetes.io/name: productpage
        app.kubernetes.io/version: v1
        app.kubernetes.io/part-of: bookinfo
    spec:
      serviceAccountName: productpage
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: productpage
          image: docker.io/istio/examples-bookinfo-productpage-v1:1.20.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9080
          env:
            - name: DETAILS_HOSTNAME
              value: details
            - name: REVIEWS_HOSTNAME
              value: reviews
            - name: GUNICORN_CMD_ARGS
              value: --workers 1 --threads 2 --timeout 60
          readinessProbe:
            tcpSocket:
              port: 9080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
