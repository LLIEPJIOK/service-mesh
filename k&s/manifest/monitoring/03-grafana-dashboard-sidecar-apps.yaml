apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-sidecar-apps
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-dashboard-sidecar-apps
    app.kubernetes.io/part-of: service-mesh-demo
    grafana_dashboard: "1"
data:
  sidecar-app-metrics.json: |
    {
      "id": null,
      "uid": "sidecar-app-metrics",
      "title": "Mesh Sidecar: Application Metrics",
      "tags": [
        "mesh",
        "sidecar",
        "bookinfo"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 3,
      "refresh": "10s",
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "service",
            "label": "Service",
            "type": "query",
            "hide": 0,
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": "label_values(mesh_requests_total, service)",
            "refresh": 1,
            "includeAll": true,
            "multi": true,
            "allValue": ".*",
            "sort": 1,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            }
          },
          {
            "name": "pod",
            "label": "Pod",
            "type": "query",
            "hide": 0,
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": "label_values(mesh_requests_total{service=~\"$service\"}, pod)",
            "refresh": 1,
            "includeAll": true,
            "multi": true,
            "allValue": ".*",
            "sort": 1,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            }
          },
          {
            "name": "direction",
            "label": "Direction",
            "type": "query",
            "hide": 0,
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": "label_values(mesh_requests_total{service=~\"$service\",pod=~\"$pod\"}, direction)",
            "refresh": 1,
            "includeAll": true,
            "multi": true,
            "allValue": ".*",
            "sort": 1,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request Rate (RPS) by Service and Pod",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (service, pod, direction) (rate(mesh_requests_total{service=~\"$service\",pod=~\"$pod\",direction=~\"$direction\"}[5m]))",
              "legendFormat": "{{service}} {{pod}} {{direction}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Error Rate (%) by Service and Pod",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "100 * ((sum by (service, pod) (rate(mesh_request_errors_total{service=~\"$service\",pod=~\"$pod\"}[5m])) or on(service,pod) (0 * sum by (service, pod) (rate(mesh_requests_total{service=~\"$service\",pod=~\"$pod\"}[5m])))) / clamp_min(sum by (service, pod) (rate(mesh_requests_total{service=~\"$service\",pod=~\"$pod\"}[5m])), 0.001))",
              "legendFormat": "{{service}} {{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "p95 Latency by Service and Pod",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, service, pod, direction) (rate(mesh_request_duration_seconds_bucket{service=~\"$service\",pod=~\"$pod\",direction=~\"$direction\"}[5m])))",
              "legendFormat": "{{service}} {{pod}} {{direction}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Retry Attempts/sec by Service and Pod",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (service, pod) (rate(mesh_retry_attempts_total{service=~\"$service\",pod=~\"$pod\"}[5m])) or on(service,pod) (0 * sum by (service, pod) (rate(mesh_requests_total{service=~\"$service\",pod=~\"$pod\"}[5m])))",
              "legendFormat": "{{service}} {{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Circuit Breaker State by Service and Pod",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "max by (service, pod) (mesh_circuit_breaker_state{service=~\"$service\",pod=~\"$pod\"})",
              "legendFormat": "{{service}} {{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 2,
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "closed"
                    },
                    "1": {
                      "text": "open"
                    },
                    "2": {
                      "text": "half-open"
                    }
                  }
                }
              ]
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Ready Endpoints by Service and Pod",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "max by (service, pod) (mesh_endpoints_ready{service=~\"$service\",pod=~\"$pod\"})",
              "legendFormat": "{{service}} {{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "unit": "none"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          }
        }
      ]
    }
