apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesh-webhook
  namespace: mesh-system
  labels:
    app.kubernetes.io/name: mesh-webhook
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: service-mesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mesh-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mesh-webhook
        app.kubernetes.io/component: control-plane
        app.kubernetes.io/part-of: service-mesh
    spec:
      serviceAccountName: mesh-webhook
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook
          image: mesh/hook:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8443
          env:
            - name: HTTP_ADDR
              value: ":8443"
            - name: TLS_CERT_FILE
              value: /tls/tls.crt
            - name: TLS_KEY_FILE
              value: /tls/tls.key
            - name: MESH_VERSION
              value: v0.1.0
            - name: SIDECAR_IMAGE
              value: mesh/sidecar:latest
            - name: IPTABLES_IMAGE
              value: mesh/iptables-init:latest
            - name: MONITORING_ENABLED
              value: "true"
            - name: INBOUND_PLAIN_PORT
              value: "15006"
            - name: OUTBOUND_PORT
              value: "15002"
            - name: INBOUND_MTLS_PORT
              value: "15001"
            - name: METRICS_PORT
              value: "9090"
            - name: EXCLUDE_INBOUND_PORTS
              value: "9090"
            - name: EXCLUDE_OUTBOUND_IPS
              value: "169.254.169.254/32"
            - name: SIDECAR_UID
              value: "1337"
            - name: LOAD_BALANCER_ALGORITHM
              value: roundRobin
            - name: RETRY_ATTEMPTS
              value: "3"
            - name: TIMEOUT
              value: 5s
            - name: CIRCUIT_BREAKER_FAILURE_THRESHOLD
              value: "5"
            - name: CIRCUIT_BREAKER_RECOVERY_TIME
              value: 30s
            - name: MAX_REQUEST_BYTES
              value: "1048576"
            - name: READ_HEADER_TIMEOUT
              value: 10s
            - name: IDLE_TIMEOUT
              value: 60s
            - name: SHUTDOWN_TIMEOUT
              value: 10s
          volumeMounts:
            - name: webhook-tls
              mountPath: /tls
              readOnly: true
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 5
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1337
            capabilities:
              drop:
                - ALL
      volumes:
        - name: webhook-tls
          secret:
            secretName: mesh-webhook-tls
