apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mesh-sidecar-injector
  labels:
    app.kubernetes.io/name: mesh-webhook
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: service-mesh
webhooks:
  - name: sidecar-injector.mesh.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 10
    reinvocationPolicy: Never
    namespaceSelector:
      matchLabels:
        mesh-injection: enabled
    objectSelector: {}
    clientConfig:
      service:
        name: mesh-webhook
        namespace: mesh-system
        path: /mutate
        port: 443
      caBundle: ""
    rules:
      - operations:
          - CREATE
          - UPDATE
        apiGroups:
          - ""
        apiVersions:
          - v1
        resources:
          - pods
